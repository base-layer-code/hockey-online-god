<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Hockey Online: God Edition</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        [span_0](start_span)[span_1](start_span)[span_2](start_span)/* 元のゲームデザインを完全継承[span_0](end_span)[span_1](end_span)[span_2](end_span) */
        body { margin: 0; background: #000; color: #fff; font-family: 'Arial Black', sans-serif; overflow: hidden; touch-action: none; }
        canvas { display: block; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; text-align: center; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        h1 { color: #00ff88; font-size: 36px; margin: 0 0 10px 0; letter-spacing: 5px; text-shadow: 0 0 20px #00ff88; }
        .settings { margin-bottom: 20px; background: #111; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .settings label { margin: 5px 10px; cursor: pointer; font-size: 14px; user-select: none; display: inline-block; }
        .settings input[type="number"] { width: 50px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; padding: 5px; text-align: center; }
        .mode-btn { font-size: 18px; padding: 15px; cursor: pointer; background: #222; color: #fff; border: 2px solid #444; border-radius: 50px; font-weight: bold; transition: 0.2s; width: 300px; margin-top: 10px; }
        .mode-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .host-btn { background: #00ff88; color: #000; border: none; box-shadow: 0 0 20px #00ff88; }
        #ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: center; gap: 50px; font-size: 50px; opacity: 0.5; pointer-events: none; z-index: 10; }
        #item-notice { position: fixed; top: 20%; width: 100%; text-align: center; font-size: 40px; color: #ff0; pointer-events: none; display: none; z-index: 50; text-shadow: 0 0 10px #ff0; }
        #status-msg { color: #00ff88; font-size: 18px; margin-bottom: 15px; border: 1px solid #00ff88; padding: 10px; border-radius: 10px; }
        .skill-container { position: fixed; bottom: 10px; display: flex; flex-direction: column; gap: 5px; padding: 10px; pointer-events: none; z-index: 10; }
        #p1-skills { left: 10px; color: #ff0055; }
        #p2-skills { right: 10px; text-align: right; color: #00ccff; }
        progress { width: 90px; height: 10px; appearance: none; }
        progress::-webkit-progress-bar { background: #222; border-radius: 5px; }
        #p1-skills progress::-webkit-progress-value { background: #ff0055; box-shadow: 0 0 10px #ff0055; }
        #p2-skills progress::-webkit-progress-value { background: #00ccff; box-shadow: 0 0 10px #00ccff; }
    </style>
</head>
<body>

<div id="ui"><span id="s1">0</span> - <span id="s2">0</span></div>
<div id="item-notice">ITEM!</div>

<div id="menu">
    <h1>NEON HOCKEY ONLINE</h1>
    <div id="status-msg">サーバーに接続中...</div>
    
    <div id="host-controls" style="display:none;">
        <div class="settings">
            [span_3](start_span)<label><input type="checkbox" id="enableItems" checked> アイテム出現[span_3](end_span)</label>
            [span_4](start_span)<label><input type="checkbox" id="enableSkills" checked> 能力（スキル）[span_4](end_span)</label>
            [span_5](start_span)<label><input type="checkbox" id="enableLimit" checked> 移動制限あり[span_5](end_span)</label>
            <div style="margin-top: 10px;">
                [span_6](start_span)<label>勝利スコア: <input type="number" id="winScore" value="5" min="1">[span_6](end_span)</label>
            </div>
        </div>
        <button id="start-btn" class="mode-btn host-btn" disabled onclick="sendStart()">2Pを待っています...</button>
    </div>

    <div id="guest-msg" style="display:none;">
        <div style="color:#00ccff; font-size: 20px;">あなたは 2P です</div>
        <div style="color:#aaa; margin-top: 10px;">1Pが設定を選んでゲームを開始するのを待っています...</div>
    </div>
</div>

<canvas id="game"></canvas>

<script>
// --- 通信・ゲーム共有変数 ---
const ROOM_PREFIX = "neon-hockey-supreme-room-"; 
let peer, conn, isHost = false;
let w, h, balls = [], p1, p2, items = [], particles = [], gameActive = false;
let score = [0, 0], targetWinScore = 5;
let useItems = true, useSkills = true, useLimit = true;

const P_RAD = 35; [span_7](start_span)//[span_7](end_span)
const COOL = { Q: 250, W: 600, E: 900 }; [span_8](start_span)//[span_8](end_span)
[span_9](start_span)const ITEM_TYPES = [ //[span_9](end_span)
    {n:'BIG', c:'#0f0', f:(p)=>p.tR=80},
    {n:'TINY', c:'#f00', f:(p,o)=>o.tR=15},
    {n:'WEAK', c:'#f80', f:(p,o)=>o.weak=240}, 
    {n:'BALL+', c:'#ff0', f:()=>createBall()},
    {n:'FREEZE', c:'#0ff', f:(p,o)=>o.frozen=120},
    {n:'REVERSE', c:'#f00', f:(p,o)=>o.rev=180}
];

// --- 自動マッチング ---
function joinRoom(num) {
    const roomID = ROOM_PREFIX + num;
    peer = new Peer(roomID);

    peer.on('open', () => {
        isHost = true;
        document.getElementById('status-msg').innerText = "あなたは 1P (HOST) です";
        document.getElementById('host-controls').style.display = "block";
        setupHost();
    });

    peer.on('error', (err) => {
        if (err.type === 'unavailable-id') {
            isHost = false;
            peer = new Peer(); 
            peer.on('open', () => {
                conn = peer.connect(roomID);
                setupGuest();
            });
        } else {
            joinRoom(num + 1);
        }
    });
}

function setupHost() {
    peer.on('connection', (c) => {
        if (conn) { c.close(); return; } // 3人目以降お断り
        conn = c;
        document.getElementById('start-btn').disabled = false;
        document.getElementById('start-btn').innerText = "GAME START";
        document.getElementById('status-msg').innerText = "2Pが参加しました！";
        handleData();
    });
}

function setupGuest() {
    conn.on('open', () => {
        document.getElementById('status-msg').innerText = "1Pに接続しました！";
        document.getElementById('guest-msg').style.display = "block";
        handleData();
    });
}

function handleData() {
    conn.on('data', (data) => {
        if (data.type === 'start') {
            useItems = data.s.items; useSkills = data.s.skills; useLimit = data.s.limit; targetWinScore = data.s.win;
            startGame();
        }
        if (data.type === 'sync') {
            if (isHost) {
                // 2Pから座標とスキル状況を受け取る
                p2.x = data.p2.x; p2.y = data.p2.y;
                p2.q = data.p2.q; p2.w = data.p2.w; p2.e = data.p2.e;
            } else {
                // 1Pからゲーム全体の状況を受け取る
                p1.x = data.p1.x; p1.y = data.p1.y;
                p1.q = data.p1.q; p1.w = data.p1.w; p1.e = data.p1.e;
                balls = data.balls; items = data.items; score = data.score;
            }
        }
    });
}

function sendStart() {
    const settings = {
        items: document.getElementById('enableItems').checked,
        skills: document.getElementById('enableSkills').checked,
        limit: document.getElementById('enableLimit').checked,
        win: parseInt(document.getElementById('winScore').value) || 5
    };
    useItems = settings.items; useSkills = settings.skills; useLimit = settings.limit; targetWinScore = settings.win;
    conn.send({ type: 'start', s: settings });
    startGame();
}

[span_10](start_span)[span_11](start_span)[span_12](start_span)// --- ゲームエンジン[span_10](end_span)[span_11](end_span)[span_12](end_span) ---
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function startGame() {
    document.getElementById('menu').style.display = "none";
    w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight;
    const base = { lx:0, ly:0, vx:0, vy:0, r:P_RAD, tR:P_RAD, frozen:0, rev:0, weak:0 };
    p1 = { ...base, x:100, y:h/2, color:'#ff0055', q:COOL.Q, w:COOL.W, e:COOL.E };
    p2 = { ...base, x:w-100, y:h/2, color:'#00ccff', q:COOL.Q, w:COOL.W, e:COOL.E };
    gameActive = true;
    if (isHost) {
        createBall();
        if (useItems) spawnItem();
    }
    loop();
}

[span_13](start_span)function createBall() { //[span_13](end_span)
    balls.push({ x:w/2, y:h/2, vx:7, vy:7, r:12, lastP:null });
}

[span_14](start_span)function spawnItem() { //[span_14](end_span)
    if(!gameActive || !useItems || !isHost) return;
    items.push({ x:w/4 + Math.random()*(w/2), y:Math.random()*(h-100)+50, ...ITEM_TYPES[Math.floor(Math.random()*ITEM_TYPES.length)] });
    setTimeout(spawnItem, 6000);
}

[span_15](start_span)// 自由な移動の同期（タッチ・マウス両対応）[span_15](end_span)
canvas.addEventListener('pointermove', e => {
    if (!gameActive) return;
    if (isHost) {
        if (p1.frozen > 0) return;
        p1.x = e.clientX; p1.y = p1.rev > 0 ? h - e.clientY : e.clientY;
        if (useLimit && p1.x > w/2 - p1.r) p1.x = w/2 - p1.r;
    } else {
        if (p2.frozen > 0) return;
        p2.x = e.clientX; p2.y = p2.rev > 0 ? h - e.clientY : e.clientY;
        if (useLimit && p2.x < w/2 + p2.r) p2.x = w/2 + p2.r;
    }
});

function loop() {
    if(!gameActive) return;
    
    if (isHost) {
        [span_16](start_span)// ホストが物理演算（ボール・当たり判定）を計算[span_16](end_span)
        balls.forEach((b, bi) => {
            b.x += b.vx; b.y += b.vy; b.vx *= 0.998; b.vy *= 0.998;
            if(b.y < b.r || b.y > h - b.r) { b.vy *= -1; b.y = b.y<b.r?b.r:h-b.r; }
            [p1, p2].forEach(p => {
                const dist = Math.hypot(b.x-p.x, b.y-p.y);
                if (dist < b.r + p.r) {
                    const angle = Math.atan2(b.y-p.y, b.x-p.x);
                    b.vx = Math.cos(angle)*18; b.vy = Math.sin(angle)*18;
                    b.lastP = p;
                }
            });
            [span_17](start_span)// アイテム取得[span_17](end_span)
            items = items.filter(it => {
                if (Math.hypot(b.x-it.x, b.y-it.y) < b.r+30 && b.lastP) {
                    it.f(b.lastP, b.lastP===p1?p2:p1);
                    return false;
                } return true;
            });
            [span_18](start_span)// スコア判定[span_18](end_span)
            if (b.x < 0) { score[1]++; balls.splice(bi,1); if(!balls.length) createBall(); }
            else if (b.x > w) { score[0]++; balls.splice(bi,1); if(!balls.length) createBall(); }
        });
        [span_19](start_span)// ゲージ回復[span_19](end_span)
        [p1, p2].forEach(p => { if(p.q<COOL.Q) p.q++; p.r += (p.tR-p.r)*0.1; if(p.frozen>0) p.frozen--; });
        conn.send({ type: 'sync', p1: p1, balls: balls, items: items, score: score });
    } else {
        // ゲストは自分の座標のみ送る
        p2.r += (p2.tR-p2.r)*0.1; if(p2.frozen>0) p2.frozen--;
        conn.send({ type: 'sync', p2: p2 });
    }
    
    draw();
    requestAnimationFrame(loop);
}

[span_20](start_span)[span_21](start_span)function draw() { //[span_20](end_span)[span_21](end_span)
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,w,h);
    if (useLimit) { ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.stroke(); }
    [p1, p2].forEach(p => {
        ctx.shadowBlur = 20; ctx.shadowColor = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx.fillStyle = p.color; ctx.fill();
    });
    balls.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fillStyle = '#fff'; ctx.fill(); });
    items.forEach(it => { ctx.fillStyle = it.c; ctx.font = 'bold 20px sans-serif'; ctx.textAlign='center'; ctx.fillText(it.n, it.x, it.y); });
    document.getElementById('s1').innerText = score[0]; document.getElementById('s2').innerText = score[1];
}

joinRoom(1);
</script>
</body>
</html>
